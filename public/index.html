<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transcript App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Transcript App</h1>
        <p>Cole a URL do vídeo do YouTube ou um Reel público do Instagram e gere a transcrição a partir do áudio via Whisper.</p>
        <form id="transcript-form">
          <label for="video-url">Link do vídeo</label>
          <input
            id="video-url"
            name="url"
            type="url"
            placeholder="https://youtu.be/... ou https://www.instagram.com/reel/..."
            required
          />
          <label for="lang">Idioma (opcional)</label>
          <input id="lang" name="lang" type="text" placeholder="pt,en" />
          <button type="submit">Transcrever</button>
        </form>
      </section>

      <section class="card">
        <h2>Download do vídeo</h2>
        <p>Cole a mesma URL de YouTube usada para a transcrição e baixe o arquivo MP4 de alta qualidade.</p>
        <div class="download-actions">
          <button id="download-video-button" type="button">Baixar vídeo</button>
          <div>
            <p id="download-status" class="download-status" hidden></p>
            <a id="download-link" class="download-link" hidden target="_blank" rel="noreferrer">Salvar vídeo</a>
          </div>
        </div>
      </section>

      <section class="card" id="results" hidden>
        <div class="actions">
          <h2>Transcrição</h2>
          <div class="actions-right">
            <button id="copy-text" type="button">Copiar tudo</button>
            <button id="download-markdown" type="button">Baixar Markdown</button>
          </div>
        </div>
        <div id="progress-bar" class="progress-bar" hidden>
          <div id="progress-filled" class="progress-filled" style="width: 0%"></div>
        </div>
        <p id="segment-info" class="segment-info" hidden></p>
        <p id="source-message" class="source-message" hidden></p>
        <p id="error" class="error" hidden></p>
        <div id="transcript-text" class="transcript"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
