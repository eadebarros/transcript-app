<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transcript App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Transcript App</h1>
        <p>Cole a URL do vídeo do YouTube e gere a transcrição a partir do áudio via Whisper.</p>
        <form id="transcript-form">
          <label for="video-url">Link do YouTube</label>
          <input id="video-url" name="url" type="url" placeholder="https://youtu.be/..." required />
          <label for="lang">Idioma (opcional)</label>
          <input id="lang" name="lang" type="text" placeholder="pt,en" />
          <button type="submit">Transcrever</button>
        </form>
      </section>

      <section class="card" id="results" hidden>
        <div class="actions">
          <h2>Transcrição</h2>
          <button id="copy-text" type="button">Copiar tudo</button>
        </div>
        <p id="segment-info" class="segment-info" hidden></p>
        <p id="error" class="error" hidden></p>
        <div id="transcript-text" class="transcript"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
